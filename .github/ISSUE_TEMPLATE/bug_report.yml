name: Bug report
description: Report a reproducible problem in Kiln.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior.
      placeholder: The run status switched to passed while stages were still pending.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: The run should stay running until all stages are terminal.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Start a real run
        2. Complete one stage
        3. Open run detail
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, Docker/local mode.
      placeholder: Windows 11, Python 3.13, local mode.
    validations:
      required: true
