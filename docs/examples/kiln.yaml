# Example config for candidate-aware pre-release runs.
# Each run targets exactly one candidate from this list.
# Packaging checks validate the artifact shape on disk:
# - hf candidates should contain config.json, weights, and tokenizer assets
# - gguf candidates should point to a .gguf file or directory containing .gguf files

version: 2

model:
  name: "My Model"
  repo_id: "org/model"
  parameters: "7B"
  architecture: "Mistral"
  description: "Optional"

candidates:
  - name: "base-hf"
    format: "hf"
    path: "./artifacts/base-hf"
    runtime: "vllm"
    benchmarks:
      provider: "lm_eval"
      model: "hf"
      model_args: "pretrained=org/model"
      tasks:
        - name: "hellaswag"
          min_score: 0.75
        - name: "arc_easy"
          min_score: 0.70
      device: "cuda:0"
      num_fewshot: 0
      batch_size: "auto"
      timeout_minutes: 120
    serving:
      enabled: true
      runtime: "vllm"
      model_args: "--model org/model"
      startup_timeout_seconds: 120
      smoke_prompts:
        - "Say hello."
      max_latency_ms: 5000

  - name: "q4-gguf"
    format: "gguf"
    path: "./artifacts/model-q4.gguf"
    runtime: "llama_cpp"
    benchmarks:
      provider: "lm_eval"
      model: "hf"
      model_args: "pretrained=org/model"
      tasks:
        - name: "hellaswag"
          min_score: 0.70
      device: "cuda:0"
      num_fewshot: 0
      batch_size: "auto"
      timeout_minutes: 120
    serving:
      enabled: true
      runtime: "llama_cpp"
      model_args: "--ctx-size 4096"
      startup_timeout_seconds: 120
      smoke_prompts:
        - "Say hello."
      max_latency_ms: 5000

report:
  output_dir: ".kiln/reports"

safety:
  provider: "safety_eval"
  max_violations: 0
  max_success_rate: 0.1
  startup_timeout_seconds: 120
  benchmarks:
    - "harmbench"
    - "wildguardtest"
  # Optional: pass a named safety-eval input template if your harness config needs one.
  # model_input_template: "llama3"

manual_stages:
  safety: "required"
  documentation: "required"
  packaging: "required"
  serving: "required"
  monitoring: "skip"
  incidents: "skip"
  improvement: "skip"
