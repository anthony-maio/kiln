<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiln — Local Release Gate</title>
<meta name="description" content="Local-first LLM release gate for open-source model builders. Track readiness across benchmark, safety, docs, packaging, and release stages.">
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='8' width='24' height='20' rx='3' fill='%236c8cff'/><rect x='8' y='4' width='16' height='8' rx='2' fill='%23ff8c6c'/><circle cx='12' cy='18' r='2' fill='white'/><circle cx='20' cy='18' r='2' fill='white'/><rect x='10' y='22' width='12' height='2' rx='1' fill='white' opacity='0.6'/></svg>">
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect x="4" y="10" width="24" height="18" rx="3" fill="var(--color-primary)"/>
          <rect x="8" y="4" width="16" height="10" rx="2" fill="var(--color-warning)"/>
          <rect x="10" y="14" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
          <rect x="18" y="14" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
          <rect x="10" y="22" width="12" height="2" rx="1" fill="white" opacity="0.5"/>
        </svg>
        <span>Kiln</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Overview</div>
        <button class="nav-item active" data-view="projects" onclick="navigate('projects')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h5l2 3h11v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><path d="M3 7V6a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v1"/></svg>
          Projects
        </button>
        <button class="nav-item" data-view="dashboard" onclick="navigate('dashboard')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-view="models" onclick="navigate('models')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          Models
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Pipeline</div>
        <button class="nav-item" data-view="runs" onclick="navigate('runs')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Runs
        </button>
        <button class="nav-item" data-view="incidents" onclick="navigate('incidents')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Incidents
          <span class="nav-badge" id="incident-badge" style="display:none">0</span>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Settings</div>
        <button class="nav-item" data-view="about" onclick="navigate('about')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          About
        </button>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="header-title" id="header-title">Projects</h1>
    </div>
    <div class="header-right">
      <button class="btn-ghost" data-theme-toggle aria-label="Toggle theme" onclick="toggleTheme()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="btn btn-primary btn-sm" onclick="openNewProjectModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5v14"/></svg>
        Add Project
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="main-content">
    <!-- Content injected by JS -->
  </main>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="new-project-modal">
  <div class="modal">
    <h2 class="modal-title">Add Local Workspace</h2>
    <div class="form-group">
      <label class="form-label">Absolute Repo Path</label>
      <input class="form-input mono" id="project-root-input" placeholder="e.g., D:\\Models\\my-model-repo">
      <p class="form-hint">Kiln will scaffold or import <code>kiln.yaml</code> at the repo root.</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('new-project-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Add Project</button>
    </div>
  </div>
</div>

<!-- New Run Modal -->
<div class="modal-overlay" id="new-run-modal">
  <div class="modal">
    <h2 class="modal-title">Start Pipeline Run</h2>
    <div class="form-group">
      <label class="form-label">Model</label>
      <select class="form-input" id="run-model-select"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Mode</label>
      <select class="form-input" id="run-mode-select">
        <option value="mock">Mock (demo data)</option>
        <option value="real">Real (requires GPU + API keys)</option>
      </select>
      <p class="form-hint">Mock mode generates realistic simulated results. Real mode executes actual evaluations.</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('new-run-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="startNewRun()">Start Run</button>
    </div>
  </div>
</div>

<!-- New Model Modal -->
<div class="modal-overlay" id="new-model-modal">
  <div class="modal">
    <h2 class="modal-title">Register Model</h2>
    <div class="form-group">
      <label class="form-label">Model Name</label>
      <input class="form-input" id="model-name-input" placeholder="e.g., My-Model-7B">
    </div>
    <div class="form-group">
      <label class="form-label">HuggingFace Repo ID</label>
      <input class="form-input" id="model-repo-input" placeholder="e.g., username/model-name">
      <p class="form-hint">Optional. Link to the HuggingFace model repository.</p>
    </div>
    <div class="form-group">
      <label class="form-label">Parameters</label>
      <input class="form-input" id="model-params-input" placeholder="e.g., 1B, 7B, 70B">
    </div>
    <div class="form-group">
      <label class="form-label">Architecture</label>
      <input class="form-input" id="model-arch-input" placeholder="e.g., LLaMA, Mistral, Custom">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="model-desc-input" rows="3" placeholder="Brief description of the model..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('new-model-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="registerModel()">Register</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
